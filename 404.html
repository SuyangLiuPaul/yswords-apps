<html lang="en">

<style>
  :root {
    --bg: #fbf8f2; --surface: #ffffff; --text: #241f16; --text-muted: #6b6152;
    --border: #e4dcc9; --blue: #0284c7; --blue-dark: #026aa1; --amber: #B8860B; --amber-dark: #8a6d1a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #17140d; --surface: #221e15; --text: #f1ebdc; --text-muted: #bcb097; --border: #3c3524; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue",
      "Segoe UI", "Microsoft YaHei", Roboto, "Noto Sans SC", "Heiti SC", sans-serif;
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;

  }
  .mark { width: 76px; height: 76px; border-radius: 18px; box-shadow: 0 6px 24px rgba(0,0,0,0.18); margin: 0 auto 26px; }
  h1 { font-size: clamp(24px, 4vw, 32px); margin: 0 0 10px; }
  p.zh { color: var(--text-muted); margin: 0 0 4px; font-size: 1.05em; }
  p.en { color: var(--text-muted); margin: 0 0 28px; font-size: 0.95em; }
  .home {
    display: inline-block; padding: 10px 24px; border-radius: 999px;
    background: linear-gradient(90deg, var(--blue), var(--amber));
    color: #fff; text-decoration: none; font-weight: 700;
  }
  .home:hover { opacity: 0.9; }
  a { color: inherit; }
</style>
</head>
<body>
  <div>
